<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
  <style>
    .th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; }
    .ts { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
    
    /* Bronze - coral */
    .bronze rect { fill: #FAECE7; stroke: #993C1D; }
    .bronze .th { fill: #712B13; }
    .bronze .ts { fill: #993C1D; }
    
    /* Silver valid - teal */
    .silver-valid rect { fill: #E1F5EE; stroke: #0F6E56; }
    .silver-valid .th { fill: #085041; }
    .silver-valid .ts { fill: #0F6E56; }
    
    /* Silver faulty - pink */
    .silver-faulty rect { fill: #FBEAF0; stroke: #993556; }
    .silver-faulty .th { fill: #72243E; }
    .silver-faulty .ts { fill: #993556; }
    
    /* Gold - amber */
    .gold rect { fill: #FAEEDA; stroke: #854F0B; }
    .gold .th { fill: #633806; }
    .gold .ts { fill: #854F0B; }
    
    /* Tests - purple */
    .test rect { fill: #EEEDFE; stroke: #534AB7; }
    .test .th { fill: #3C3489; }
    .test .ts { fill: #534AB7; }
    
    .arrow { stroke: #888780; stroke-width: 1.5; }
    .leader { stroke: #B4B2A9; stroke-width: 0.5; stroke-dasharray: 4 2; }
  </style>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Bronze Layer -->
  <g class="bronze">
    <rect x="40" y="40" width="160" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="120" y="68" text-anchor="middle" dominant-baseline="central">Bronze</text>
    <text class="ts" x="120" y="90" text-anchor="middle" dominant-baseline="central">sales.csv (100 rows)</text>
  </g>

  <!-- Arrow Bronze -> Silver -->
  <line x1="200" y1="75" x2="270" y2="75" class="arrow" marker-end="url(#arrow)"/>
  <text class="ts" x="235" y="60" text-anchor="middle">transform</text>

  <!-- Silver Valid -->
  <g class="silver-valid">
    <rect x="280" y="20" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="360" y="40" text-anchor="middle" dominant-baseline="central">Silver valid</text>
    <text class="ts" x="360" y="58" text-anchor="middle" dominant-baseline="central">90 rows</text>
  </g>

  <!-- Silver Faulty -->
  <g class="silver-faulty">
    <rect x="280" y="90" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="360" y="110" text-anchor="middle" dominant-baseline="central">Silver faulty</text>
    <text class="ts" x="360" y="128" text-anchor="middle" dominant-baseline="central">10 rows</text>
  </g>

  <!-- Arrow Silver Valid -> Gold -->
  <line x1="440" y1="48" x2="480" y2="48" class="arrow" marker-end="url(#arrow)"/>

  <!-- Gold Layer -->
  <g class="gold">
    <rect x="490" y="20" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="570" y="40" text-anchor="middle" dominant-baseline="central">Gold</text>
    <text class="ts" x="570" y="58" text-anchor="middle" dominant-baseline="central">SQL table (90 rows)</text>
  </g>

  <!-- Test 1: Bronze == Silver total -->
  <g class="test">
    <rect x="120" y="180" width="280" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="260" y="205" text-anchor="middle" dominant-baseline="central">Test 1: Bronze == Silver total</text>
    <text class="ts" x="260" y="230" text-anchor="middle" dominant-baseline="central">100 == 90 + 10 ✓</text>
  </g>
  
  <!-- Dashed lines connecting test 1 -->
  <line x1="120" y1="110" x2="120" y2="180" class="leader"/>
  <line x1="360" y1="146" x2="360" y2="180" class="leader"/>

  <!-- Test 2: Silver valid == Gold -->
  <g class="test">
    <rect x="320" y="280" width="280" height="70" rx="8" stroke-width="0.5"/>
    <text class="th" x="460" y="305" text-anchor="middle" dominant-baseline="central">Test 2: Silver valid == Gold</text>
    <text class="ts" x="460" y="330" text-anchor="middle" dominant-baseline="central">90 == 90 ✓</text>
  </g>

  <!-- Dashed lines connecting test 2 -->
  <line x1="360" y1="76" x2="360" y2="160" class="leader"/>
  <line x1="360" y1="160" x2="420" y2="280" class="leader"/>
  <line x1="570" y1="76" x2="570" y2="160" class="leader"/>
  <line x1="570" y1="160" x2="500" y2="280" class="leader"/>

  <!-- Summary -->
  <text class="ts" x="340" y="390" text-anchor="middle">Brak utraty danych między warstwami = PASSED</text>
</svg>
